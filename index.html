<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#070712">
    <meta name="description" content="Next-Gen Global World Clock & Country Explorer">
    <title>ChronoWorld PWA</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="theme-dark">
    <!-- Professional Splash Preloader -->
    <div id="splashScreen" class="splash-screen">
        <div class="splash-content">
            <div class="splash-icon-wrapper">
                <i class="fa-solid fa-clock"></i>
            </div>
            <h1 class="splash-title" data-i18n="appTitle">عالم الزمن</h1>
            <div class="splash-loading-bar"><div class="splash-loading-progress"></div></div>
        </div>
    </div>

    <!-- Custom Magnetic Cursor -->
    <div id="magneticCursor" class="magnetic-cursor"></div>
    <div id="securityLayer" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:999999;"></div>

    <!-- Background Ambience -->
    <div class="ambient-bg">
        <div class="glow-orb purple"></div>
        <div class="glow-orb blue"></div>
    </div>

    <!-- App Shell Container -->
    <div id="appShell">
        <!-- Global Header -->
        <header class="main-header glass">
            <div class="logo cursor-pointer" onclick="router.navigate('/')">
                <i class="fa-solid fa-globe"></i>
                <h1 data-i18n="appTitle">ChronoWorld</h1>
            </div>
            
            <div class="header-actions">
                <div class="local-time-widget">
                    <span class="label" data-i18n="localTime">Local Time</span>
                    <span id="headerLocalTime" class="time tabular-nums">--:--:--</span>
                </div>
                
                <button id="themeToggle" class="icon-btn" title="Toggle Theme">
                    <i class="fa-solid fa-moon"></i>
                </button>
                
                <button id="langToggle" class="icon-btn font-bold">
                    <span class="en-only">AR</span>
                    <span class="ar-only">EN</span>
                </button>
            </div>
        </header>

        <!-- View Container (Injected by JS Router) -->
        <main id="viewContainer" class="view-container">
            <!-- Loading Skeleton -->
            <div class="loader-container">
                <div class="spinner"></div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="main-footer">
            <p data-i18n="footerText">© 2026 All Rights Reserved | Developer: Abdulrahman Radwan</p>
        </footer>
    </div>

    <!-- Required Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- LocalForage for IndexedDB caching -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
