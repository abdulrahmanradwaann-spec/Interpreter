<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Interpreter AI - نظام ترجمة ذكي متعدد الوسائط | المطور: عبدالرحمن رضوان">
    <meta name="author" content="عبدالرحمن رضوان">
    <meta name="theme-color" content="#08081c">
    <link rel="manifest" href="manifest.json">
    <title>🌐 Interpreter AI | الترجمة الذكية متعددة الوسائط</title>
</head>
<body>

    <!-- شاشة التحميل -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loader-spinner"></div>
        <p class="loader-text">جارٍ تشغيل Interpreter AI...</p>
    </div>

    <!-- الهيدر -->
    <header class="app-header">
        <div class="brand">
            <div class="logo">🌐</div>
            <div>
                <div class="app-name">Interpreter AI</div>
                <div>عبدالرحمن رضوان</div>
            </div>
        </div>
        <nav class="nav-tabs">
            <button class="nav-tab active" data-tab="text">📝 النص</button>
            <button class="nav-tab" data-tab="speech">🎤 الصوت</button>
            <button class="nav-tab" data-tab="image">🖼️ الصورة</button>
        </nav>
        <div id="connectionBadge" class="connection-badge online">
            <span class="status-dot"></span> <span id="connectionLabel">متصل</span>
        </div>
    </header>

    <div class="main-container">
        <!-- تبويب النص -->
        <div class="tab-content active" id="tab-text">
            <div class="split-screen">
                <div class="panel source">
                    <div class="panel-label"><span class="dot"></span> اللغة المصدر</div>
                    <select class="lang-select" id="sourceLang">
                        <option value="ar">العربية</option>
                        <option value="en" selected>English</option>
                        <option value="fr">Français</option>
                        <option value="es">Español</option>
                        <option value="de">Deutsch</option>
                        <option value="zh">中文</option>
                        <option value="ja">日本語</option>
                        <option value="ko">한국어</option>
                        <option value="ru">Русский</option>
                        <option value="it">Italiano</option>
                    </select>
                    <textarea class="text-area" id="sourceText" placeholder="اكتب النص هنا..."></textarea>
                    <div>
                        <button class="btn btn-primary" id="translateBtn">✨ ترجمة</button>
                        <button class="btn btn-secondary" id="detectLangBtn">🔍 اكتشف اللغة</button>
                    </div>
                </div>
                <button class="swap-btn" id="swapLangsBtn">⇄</button>
                <div class="panel target">
                    <div class="panel-label"><span class="dot"></span> اللغة الهدف</div>
                    <select class="lang-select" id="targetLang">
                        <option value="ar" selected>العربية</option>
                        <option value="en">English</option>
                        <option value="fr">Français</option>
                        <option value="es">Español</option>
                        <option value="de">Deutsch</option>
                    </select>
                    <textarea class="text-area" id="targetText" placeholder="الترجمة..." readonly></textarea>
                    <div>
                        <button class="btn btn-secondary" id="copyBtn">📋 نسخ</button>
                        <button class="btn btn-secondary" id="speakBtn">🔊 استماع</button>
                    </div>
                </div>
            </div>
            <div class="history-section">
                <h3>📚 سجل الترجمة</h3>
                <div id="historyList"></div>
                <button class="btn btn-secondary" id="clearHistoryBtn">🗑 مسح السجل</button>
            </div>
        </div>

        <!-- تبويب الصوت -->
        <div class="tab-content" id="tab-speech">
            <div class="speech-container">
                <canvas class="waveform-canvas" id="waveCanvas"></canvas>
                <button class="mic-btn" id="micBtn">🎙️</button>
                <p>انقر وتحدث – ترجمة فورية</p>
                <div id="speechResult"></div>
                <div id="speechTrans"></div>
            </div>
        </div>

        <!-- تبويب الصورة -->
        <div class="tab-content" id="tab-image">
            <div class="image-upload-zone" id="imageDropZone">
                <div>🖼️</div>
                <p>اسحب وأفلت الصورة هنا أو انقر للاختيار</p>
                <input type="file" id="imageInput" accept="image/*">
            </div>
            <div id="imagePreviewContainer">
                <img id="imagePreview" alt="معاينة الصورة">
            </div>
            <div id="ocrResult"></div>
            <div id="ocrTranslation"></div>
            <button class="btn btn-primary" id="processImageBtn">🔍 استخراج وترجمة</button>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 <span class="dev">Abdulrahman Radwan</span> — All Rights Reserved</p>
        <p>Interpreter AI — Intelligent Multimodal Translation System</p>
    </footer>

</body>
</html>
